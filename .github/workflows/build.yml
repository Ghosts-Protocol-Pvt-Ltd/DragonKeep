name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test
        run: cargo test --release

      - name: Smoke test — dragonkeep --version
        run: |
          ./target/release/dragonkeep --version || ./target/release/dragonkeep.exe --version
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragonkeep-${{ matrix.os }}
          path: |
            target/release/dragonkeep
            target/release/dragonkeep.exe
          if-no-files-found: warn
